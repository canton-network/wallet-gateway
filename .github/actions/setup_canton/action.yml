name: 'Setup Canton'
description: 'Cache, download and optionally start Canton environment'
inputs:
    network:
        description: 'Network type: devnet or mainnet'
        required: true
    canton_version:
        description: 'Canton version (required)'
        required: true
    multi-sync:
        description: 'Start localnet with --profile multi-sync'
    start_services:
        description: 'Whether to start canton services after setup'
        required: false
        default: 'true'
    save_cache:
        description: 'Whether to save the Canton cache on a cache miss'
        required: false
        default: 'false'
    lookup_only:
        description: 'Whether to only check if the Canton cache exists without restoring it'
        required: false
        default: 'false'
runs:
    using: 'composite'
    steps:
        - name: Cache Canton binaries
          uses: actions/cache/restore@v5
          id: canton-cache
          with:
              path: .canton
              key: ${{ runner.os }}-canton-${{ inputs.canton_version }}
              lookup-only: ${{ inputs.lookup_only == 'true' }}

        - name: Download Canton
          if: steps.canton-cache.outputs.cache-hit != 'true'
          shell: bash
          run: yarn script:fetch:canton --network=${{ inputs.network }}

        - name: Start Canton
          if: inputs.start_services == 'true'
          shell: bash
          run: |
              set -e
              timeout 5m bash -c '
                LOGFILE=canton_start.log
                yarn start:canton --network=${{ inputs.network }} > "$LOGFILE" 2>&1 &
                pid=$!
                for i in {1..60}; do
                  if grep -q "Bootstrap script successfully executed." "$LOGFILE"; then
                    echo "Canton started successfully."
                    exit 0
                  fi
                  if ! kill -0 $pid 2>/dev/null; then
                    echo "Canton process exited unexpectedly."
                    cat "$LOGFILE"
                    exit 1
                  fi
                  sleep 5
                done
                echo "Timeout: '"'"'Bootstrap script successfully executed.'"'"' not found in 5 minutes."
                cat "$LOGFILE"
                exit 1
              '
        # TODO (#1721): make multi-sync the default and remove the flag once multi-sync is fully supported and tested in the main scripts e2e tests, but for now we want to keep it as an option to avoid accidentally running multi-sync e2e tests without updating the main scripts e2e tests to cover multi-sync as well
        - name: Start Localnet
          if: inputs.instance == 'localnet'
          shell: bash
          run: |
              MULTI_SYNC_FLAG=""
              if [ "${{ inputs.multi-sync }}" = "true" ]; then
                MULTI_SYNC_FLAG="--multi-sync"
              fi
              yarn start:localnet -- --network=${{ inputs.network }} $MULTI_SYNC_FLAG

        - name: Save Docker images to cache
          if: ${{ inputs.instance == 'localnet' && steps.localnet-cache.outputs.cache-hit != 'true' }}
          shell: bash
          run: |
              mkdir -p /tmp/docker-images
              images=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep -v "<none>" || true)
              if [ -n "$images" ]; then
                echo "$images" | xargs -r docker save -o /tmp/docker-images/images.tar
              else
                echo "No Docker images found to save."
              fi

        - name: Save Canton cache
          uses: ./.github/actions/save_cache_if_absent
          with:
              path: .canton
              key: ${{ runner.os }}-canton-${{ inputs.canton_version }}
              save_cache: ${{ inputs.save_cache }}
              initial_cache_hit: ${{ steps.canton-cache.outputs.cache-hit }}
